name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/fc-estimate
            git fetch origin main
            git reset --hard origin/main
            cd backend-node
            npm ci --omit=dev
            pm2 restart fc-builder-api --update-env
            sleep 3
            curl -sf localhost:4100/health || (pm2 logs fc-builder-api --lines 30 --nostream; exit 1)
            echo "deploy OK"
